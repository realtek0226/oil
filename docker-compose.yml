services:
  oil-research-app:
    build:
      context: .
    container_name: oil-research-app
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: Asia/Shanghai
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - ./outputs:/app/outputs
      - ./app/config/app_config.json:/app/app/config/app_config.json:ro
      - ./data:/app/data:ro
    expose:
      - "8036"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8036/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  nginx:
    image: nginx:1.27-alpine
    container_name: oil-research-nginx
    restart: unless-stopped
    depends_on:
      oil-research-app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/oil-research.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
