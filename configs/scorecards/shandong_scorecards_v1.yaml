                  neutral: 0
                  secondary_off: -2
                  "off": -5
              - feature_name: "restocking_rhythm_monthly"
                method: "enum_score"
                weight_pct_inside_group: 5
                score_cap: 5
                rules:
                  active_restocking: 5
                  stable_small_lots: 0
                  reduced_restocking: -5
              - feature_name: "holiday_demand_delta_monthly"
                method: "enum_score"
                weight_pct_inside_group: 5
                score_cap: 5
                rules:
                  more_holidays: 5
                  unchanged: 0
                  fewer_holidays: -5
