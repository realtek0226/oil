version: v1.2.0
owner: oil_research
source_document: 山东成品油市场价预测打分模型
generated_at: '2026-06-06'
notes:
- 业务打分配置：所有分位数历史窗口从2024-01-01起算。
- 库存合计按可用库存组件求和；组件上期有数本期缺失时提示数据缺失。
globals:
  score_range:
    min: -100
    max: 100
  default_publish_mode: deterministic
  default_missing_policy: fallback_to_last_available
  default_currency: CNY
  default_unit: ton
  override_controls:
    supply_news_adjustment_range:
      min: -5
      max: 5
    extreme_event_total_adjustment_range:
      min: -10
      max: 10
product_templates:
  gasoline:
    crack_feature_prefix: gasoline
    monthly_seasonality:
      peak_months:
      - 5
      - 6
      - 7
      - 8
      secondary_peak_months:
      - 3
      - 4
      - 9
      secondary_off_months:
      - 2
      neutral_months: []
      off_months:
      - 1
      - 10
      - 11
      - 12
  diesel:
    crack_feature_prefix: diesel
    monthly_seasonality:
      peak_months:
      - 3
      - 4
      - 8
      - 9
      - 10
      neutral_months:
      - 11
      - 12
      off_months:
      - 1
      - 2
      - 5
      - 7
scorecards:
- scorecard_code: sd_gas92
  display_name: Shandong 92# gasoline
  entity_code: SD_GAS92
  product_family: gasoline
  horizons:
    D1:
      display_name: 次日
      target: next_trading_day_market_price
      score_range:
      - -100
      - 100
      factor_groups:
      - group_code: cost
        display_name: 成本侧
        weight_pct: 40
        score_cap: 40
        features:
        - feature_name: brent_change_usd_d1
          method: bucket_score
          rules:
          - min: 3
            max: null
            score: 40
            label: large_up
          - min: 2
            max: 3
            score: 30
            label: medium_large_up
          - min: 1
            max: 2
            score: 20
            label: medium_up
          - min: 0.5
            max: 1
            score: 10
            label: small_up
          - min: -0.5
            max: 0.5
            score: 0
            label: flat
          - min: -1
            max: -0.5
            score: -10
            label: small_down
          - min: -2
            max: -1
            score: -20
            label: medium_down
          - min: -3
            max: -2
            score: -30
            label: medium_large_down
          - min: null
            max: -3
            score: -40
            label: large_down
          source_hint: 'Keep current YAML/code data basis: Brent daily report forecast point minus previous settlement.'
          display_name: Brent日变化
        - feature_name: gasoline_crack_percentile
          display_name: 汽油裂解价差分位
          method: bucket_score
          rules:
          - min: null
            max: 25
            score: 10
            label: low_crack_percentile
          - min: 25
            max: 45
            score: 5
            label: medium_low_crack_percentile
          - min: 45
            max: 55
            score: 0
            label: middle_crack_percentile
          - min: 55
            max: 75
            score: -5
            label: medium_high_crack_percentile
          - min: 75
            max: null
            score: -10
            label: high_crack_percentile
          source_hint: 裂解价差分位按2024-01-01至当前可用日计算；低裂解代表利润压缩和价格修复压力，高裂解代表利润空间和回落压力。
        adjustments: []
        formula_notes:
        - Gasoline crack = gasoline market price / 1.13 - 2109.76 - Brent * 6.77 * CNY mid
        - Diesel crack = diesel market price / 1.13 - 1411.20 - Brent * 6.77 * CNY mid
        - Use T-day market price if updated, otherwise T-1
      - group_code: supply
        display_name: 供给侧
        weight_pct: 15
        score_cap: 15
        features:
        - feature_name: shandong_cdu_utilization_weekly
          method: bucket_score
          rules:
          - min: null
            max: 25
            score: 15
            label: low_utilization
          - min: 25
            max: 45
            score: 8
            label: medium_low_utilization
          - min: 45
            max: 55
            score: 0
            label: middle_utilization
          - min: 55
            max: 75
            score: -8
            label: medium_high_utilization
          - min: 75
            max: null
            score: -15
            label: high_utilization
          note: 山东地炼常减压开工率用2024-01-01以来历史分位分桶；仅当最新观测日=预测输入日前一天，且本期相对上一期有变化时计分；否则按0分。例如上次数据更新为2026-06-05，2026-06-13预测时取2026-06-12开工率与2026-06-05对比，有变化才计分；之后直到下次更新前都按0分。
