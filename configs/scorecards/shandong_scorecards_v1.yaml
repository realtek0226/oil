version: "v1.2.0"
owner: "oil_research"
source_document: "山东成品油市场价预测打分模型.docx"
generated_at: "2026-06-06"
notes:
  - "This file maps the business scorecard into machine-readable config."
  - "Updated from the revised DOCX: CDU utilization uses the raw weekly utilization percentage directly for bucket scores when the value changes."
  - "Updated from 数据清单及打分逻辑.xlsx: Brent bucket thresholds, W1 policy score, inventory buckets, gasoline seasonality, and production-sales ratio buckets are aligned with Excel where executable."

globals:
  score_range:
    min: -100
    max: 100
  default_publish_mode: "deterministic"
  default_missing_policy: "fallback_to_last_available"
  default_currency: "CNY"
  default_unit: "ton"
  override_controls:
    supply_news_adjustment_range:
      min: -5
      max: 5
    extreme_event_total_adjustment_range:
      min: -10
      max: 10

product_templates:
  gasoline:
    crack_feature_prefix: "gasoline"
    monthly_seasonality:
      peak_months: [5, 6, 7, 8]
      secondary_peak_months: [3, 4, 9]
      secondary_off_months: [2]
      neutral_months: []
      off_months: [1, 10, 11, 12]
  diesel:
    crack_feature_prefix: "diesel"
    monthly_seasonality:
      peak_months: [3, 4, 8, 9, 10]
      neutral_months: [11, 12]
      off_months: [1, 2, 5, 7]

scorecards:
  - scorecard_code: "sd_gas92"
    display_name: "Shandong 92# gasoline"
    entity_code: "SD_GAS92"
    product_family: "gasoline"
    horizons:
      D1:
        display_name: "T+1 daily"
        target: "next_trading_day_market_price"
        score_range: [-100, 100]
        factor_groups:
          - group_code: "cost"
            display_name: "Cost side"
            weight_pct: 40
            score_cap: 40
            features:
              - feature_name: "brent_change_usd_d1"
                method: "bucket_score"
                rules:
                  - min: 3
                    max: null
                    score: 40
                    label: "large_up"
                  - min: 2
                    max: 3
                    score: 30
                    label: "medium_large_up"
                  - min: 1
                    max: 2
                    score: 20
                    label: "medium_up"
                  - min: 0.5
                    max: 1
                    score: 10
                    label: "small_up"
                  - min: -0.5
                    max: 0.5
                    score: 0
                    label: "flat"
                  - min: -1
                    max: -0.5
                    score: -10
                    label: "small_down"
                  - min: -2
                    max: -1
                    score: -20
                    label: "medium_down"
                  - min: -3
                    max: -2
                    score: -30
                    label: "medium_large_down"
                  - min: null
                    max: -3
                    score: -40
                    label: "large_down"
                source_hint: "Keep current YAML/code data basis: Brent daily report forecast point minus previous settlement."
            adjustments: []
            formula_notes:
              - "Gasoline crack = gasoline market price / 1.13 - 2109.76 - Brent * 6.77 * CNY mid"
              - "Diesel crack = diesel market price / 1.13 - 1411.20 - Brent * 6.77 * CNY mid"
              - "Use T-day market price if updated, otherwise T-1"
          - group_code: "supply"
            display_name: "Supply side"
            weight_pct: 15
            score_cap: 15
            features:
              - feature_name: "shandong_cdu_utilization_weekly"
                method: "bucket_score"
                rules:
                  - min: null
                    max: 25
                    score: 15
                    label: "low_utilization"
                  - min: 25
                    max: 45
                    score: 8
                    label: "medium_low_utilization"
                  - min: 45
                    max: 55
                    score: 0
                    label: "middle_utilization"
                  - min: 55
                    max: 75
                    score: -8
                    label: "medium_high_utilization"
                  - min: 75
                    max: null
                    score: -15
                    label: "high_utilization"
                note: "山东地炼常减压开工率用周度原始百分比值直接分桶；若与前一条数据一致则0分。"
            adjustments:
              - feature_name: "shandong_refinery_load_news_adjustment_d1"
                method: "bounded_numeric"
                min: -5
                max: 5
                note: "Temporary load reduction / operational headlines"
          - group_code: "demand"
            display_name: "Demand side / production-sales ratio"
            weight_pct: 30
            score_cap: 30
            features:
              - feature_name: "sales_production_ratio_d1"
                method: "bucket_score"
                rules:
                  - min: 110
                    max: null
                    score: 30
                  - min: 100
                    max: 110
                    score: 15
                  - min: 95
                    max: 100
                    score: 10
                  - min: 90
                    max: 95
                    score: 5
                  - min: 85
                    max: 90
                    score: 0
                  - min: 70
                    max: 85
                    score: -15
                  - min: null
                    max: 70
                    score: -30
                fallback: "use_t_minus_1_if_missing"
                note: "产销率=销量/产量*100；无产量数据时不再用销量环比替代"
          - group_code: "sentiment"
            display_name: "Sentiment side"
            weight_pct: 15
            score_cap: 15
            features:
              - feature_name: "trader_sentiment_label_d1"
                method: "enum_score"
                rules:
